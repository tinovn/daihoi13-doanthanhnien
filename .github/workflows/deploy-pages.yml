name: Deploy Web to GitHub Pages

# Trigger khi push vào main, hoặc chạy thủ công
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Quyền cần thiết cho GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hủy job cũ nếu có push mới
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (web/ folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
