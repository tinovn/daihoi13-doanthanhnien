<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tin tức - Sự kiện | Đại hội Đoàn XIII</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Alfa+Slab+One&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="tin-tuc">
<div id="ecc-header"></div>
<div id="ecc-nav"></div>

<section class="page-hero">
  <div class="container-x">
    <div class="breadcrumb"><a href="index.html">Trang chủ</a> / Tin tức - Sự kiện</div>
    <h1>TIN TỨC - SỰ KIỆN</h1>
    <p class="text-yellow-300 text-sm">Cập nhật tin mới nhất về Đại hội Đoàn XIII từ báo Thanh Niên</p>
  </div>
</section>

<section class="py-10">
  <div class="container-x grid lg:grid-cols-4 gap-6">
    <!-- Main news grid -->
    <div class="lg:col-span-3">
      <div class="flex flex-wrap items-center gap-3 mb-6 border-b pb-3">
        <button class="px-4 py-2 bg-red-600 text-white rounded text-sm font-bold">Tất cả</button>
        <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded text-sm font-semibold hover:bg-red-100">Chuẩn bị Đại hội</button>
        <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded text-sm font-semibold hover:bg-red-100">Đại hội các cấp</button>
        <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded text-sm font-semibold hover:bg-red-100">Hoạt động chào mừng</button>
        <span class="text-xs text-gray-500 ml-auto">Nguồn: thanhnien.vn</span>
      </div>

      <!-- Loading state -->
      <div id="news-loading" class="text-center py-12">
        <div class="inline-block w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-600 font-semibold">Đang tải tin tức...</p>
      </div>

      <div class="grid md:grid-cols-2 gap-6" id="news-grid" style="display:none"></div>

      <div class="flex justify-center gap-2 mt-10" id="news-pagination" style="display:none">
        <button class="px-3 py-2 border rounded text-sm hover:bg-gray-100" data-page="prev">‹</button>
        <button class="px-3 py-2 border rounded text-sm bg-red-600 text-white" data-page="1">1</button>
        <button class="px-3 py-2 border rounded text-sm hover:bg-gray-100" data-page="2">2</button>
        <button class="px-3 py-2 border rounded text-sm hover:bg-gray-100" data-page="3">3</button>
        <button class="px-3 py-2 border rounded text-sm hover:bg-gray-100" data-page="next">›</button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="space-y-6">
      <div class="bg-red-50 border-l-4 border-red-600 p-4 rounded">
        <h3 class="font-extrabold text-red-600 uppercase text-sm mb-3 flex items-center gap-2">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M12 2L14.9 9.1 22 9.7l-5.4 4.7L18.2 22 12 18l-6.2 4 1.6-7.6L2 9.7l7.1-.6z"/></svg>
          Tin nổi bật
        </h3>
        <ul class="space-y-3 text-sm" id="news-highlights">
          <li class="text-gray-400 italic">Đang tải...</li>
        </ul>
      </div>

      <div class="bg-red-50 border-l-4 border-red-600 p-4 rounded">
        <h3 class="font-extrabold text-red-600 uppercase text-sm mb-3 flex items-center gap-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
          Lịch sự kiện
        </h3>
        <div class="space-y-2 text-sm">
          <div><strong class="text-red-600">26/06/2026</strong><br/>Khai mạc Đại hội XIII</div>
          <div><strong class="text-red-600">28/06/2026</strong><br/>Phiên thảo luận chuyên đề</div>
          <div><strong class="text-red-600">30/06/2026</strong><br/>Bế mạc Đại hội</div>
        </div>
      </div>
    </aside>
  </div>
</section>

<div id="ecc-footer"></div>
<div id="ecc-floating"></div>
<script src="partials.js"></script>
<script>
// Lấy dữ liệu từ API báo Thanh Niên qua tag "dai-hoi-doan-toan-quoc"
const TNO_API = 'https://util8.cnnd.vn/api/tno/get-news-by-tag.htm';
const TNO_BASE_URL = 'https://thanhnien.vn';
const IMG_BASE = 'https://images2.thanhnien.vn';

// SVG icons (vector, no emoji)
const ICON_CAL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>';
const ICON_EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = (n) => String(n).padStart(2, '0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}

function imgUrl(item) {
  // Avatar đã là URL đầy đủ; AvatarCrop dùng path tương đối
  if (item.Avatar && item.Avatar.startsWith('http')) return item.Avatar;
  if (item.AvatarCrop) return IMG_BASE + item.AvatarCrop;
  return 'https://placehold.co/600x400?text=No+Image';
}

function renderNews(items) {
  const grid = document.getElementById('news-grid');
  grid.innerHTML = '';
  items.forEach((item) => {
    const url = TNO_BASE_URL + (item.Url || '#');
    const date = fmtDate(item.DistributionDate);
    grid.insertAdjacentHTML('beforeend', `
      <article class="border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg transition bg-white">
        <a href="${url}" target="_blank" rel="noopener">
          <img src="${imgUrl(item)}" class="w-full h-48 object-cover" alt="" loading="lazy"/>
          <div class="p-4">
            <span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded font-bold">ĐẠI HỘI XIII</span>
            <h3 class="font-bold mt-2 line-clamp-2 leading-snug text-gray-900">${item.Title || ''}</h3>
            <p class="text-xs text-gray-600 mt-2 line-clamp-3">${item.Sapo || ''}</p>
            <p class="text-xs text-gray-500 mt-3">${ICON_CAL} ${date}</p>
          </div>
        </a>
      </article>
    `);
  });
}

function renderHighlights(items) {
  const ul = document.getElementById('news-highlights');
  ul.innerHTML = '';
  items.slice(0, 5).forEach((item) => {
    const url = TNO_BASE_URL + (item.Url || '#');
    ul.insertAdjacentHTML('beforeend', `
      <li><a href="${url}" target="_blank" rel="noopener" class="hover:text-red-600 font-medium block leading-snug">${item.Title}</a></li>
    `);
  });
}

function showFallback(msg) {
  const loading = document.getElementById('news-loading');
  loading.innerHTML = `
    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-left max-w-2xl mx-auto">
      <h3 class="font-bold text-yellow-800 mb-2">⚠ Không thể tải tin tức trực tiếp</h3>
      <p class="text-sm text-yellow-700 mb-3">${msg}</p>
      <p class="text-xs text-yellow-600">API: <code>${TNO_API}?tagUrl=dai-hoi-doan-toan-quoc</code></p>
      <p class="text-xs text-yellow-600 mt-2">Cần backend proxy để bypass CORS, hoặc truy cập trực tiếp: <a href="https://thanhnien.vn/tag/dai-hoi-doan-toan-quoc.tag" target="_blank" class="text-blue-600 underline">thanhnien.vn/tag/dai-hoi-doan-toan-quoc</a></p>
    </div>
  `;
}

async function loadNews() {
  try {
    const url = `${TNO_API}?pageIndex=1&pageSize=20&tagUrl=dai-hoi-doan-toan-quoc`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const items = json.data && json.data.listNews ? json.data.listNews : [];
    if (items.length === 0) throw new Error('Không có tin tức nào');

    document.getElementById('news-loading').style.display = 'none';
    document.getElementById('news-grid').style.display = 'grid';
    document.getElementById('news-pagination').style.display = 'flex';
    renderNews(items);
    renderHighlights(items);
  } catch (err) {
    console.error('Lỗi tải tin:', err);
    showFallback(`Lỗi: ${err.message}. Có thể do CORS browser block hoặc server tạm thời không phản hồi.`);
  }
}

loadNews();
</script>
</body>
</html>
